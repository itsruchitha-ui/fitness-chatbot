<!DOCTYPE html>
<html>
<head>
    <title>Fitness and Meal Planning Coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Fitness and Meal Planning Coach Chatbot</h1>
    <div class="chat-box" id="chatBox">
        <div class="bot-message">
            Hi! I'm Fitness and Meal Planning Coach. How can I help you today?
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
